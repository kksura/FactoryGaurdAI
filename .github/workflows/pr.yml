# Pull-request gate. NOTE: unexecuted from the GB10 environment (no GitHub
# remote configured yet); validated locally via yaml parsing + the same
# commands run through `make`.
name: pr

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/lock.txt
      - name: Install locked dependencies
        run: |
          pip install -r requirements/lock.txt
          pip install --no-deps -e .
      - name: Lint (ruff)
        run: |
          ruff check src apps pipelines scripts tests
          ruff format --check src apps pipelines scripts tests
      - name: Type check (mypy)
        run: mypy
      - name: Unit + contract tests
        run: pytest tests/unit tests/contract tests/ml -m "not integration and not gpu and not slow" --cov --cov-report=xml
      - name: Security tests
        run: pytest tests/security -m "not integration"

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Secret scan (detect-secrets)
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline
      - name: SAST (bandit)
        run: |
          pip install "bandit[toml]"
          bandit -c pyproject.toml -q -r src apps pipelines scripts
      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements/lock.txt

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t factoryguard-api:pr .
      - name: Scan image (trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: factoryguard-api:pr
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: SBOM (syft)
        uses: anchore/sbom-action@v0.17.0
        with:
          image: factoryguard-api:pr
          format: spdx-json
          output-file: sbom-image.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-image.spdx.json
