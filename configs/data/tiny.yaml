# Tiny profile: unit tests and CI. Seconds to generate, minimal footprint.
profile: tiny
seed: 42
date_range:
  start: "2026-03-01"
  end: "2026-04-30"
world:
  plants: 1
  lines_per_plant: 2
  crimp_machines_per_line: 2
  operators_per_plant: 12
  suppliers: 3
  product_families: 2
  products_per_family: 2
  material_lots_per_component: 4
production:
  units: 240
  units_per_work_order: 20
  target_defect_rate: 0.10          # elevated so tiny sets still contain positives
timeseries:
  crimp_force_points: 64
  aux_points: 32
  aux_channels: [motor_current, vibration]
  sensor_dropout_rate: 0.01
images:
  per_unit_probability: 0.5
  size: 96
labels:
  label_delay_days: 2
  label_noise_rate: 0.0
mechanisms:
  tool_wear: {enabled: true, wear_per_cycle: 0.06, strength: 3.0}
  supplier_lot: {enabled: true, bad_lot_fraction: 0.3, strength: 3.0}
  humidity: {enabled: true, threshold_pct: 68, strength: 2.5}
  calibration_offset: {enabled: true, affected_machine_fraction: 0.3, strength: 2.5}
  changeover: {enabled: true, first_pieces: 5, strength: 1.6}
  sensor_drift: {enabled: true, drift_per_day: 0.002}
  maintenance_effect: {enabled: true, relief: 0.8, halflife_days: 3}
  revision_shift: {enabled: true, shifted_revision_fraction: 0.5, strength: 1.2}
  night_shift_load: {enabled: true, strength: 1.3}
  camera_misalignment: {enabled: true, window_fraction: 0.15, blur_sigma: 2.2}
