# Small profile: local functional development. ~1–2 min generation.
profile: small
seed: 42
date_range:
  start: "2026-01-01"
  end: "2026-05-31"
world:
  plants: 2
  lines_per_plant: 2
  crimp_machines_per_line: 3
  operators_per_plant: 24
  suppliers: 5
  product_families: 3
  products_per_family: 3
  material_lots_per_component: 8
production:
  units: 2500
  units_per_work_order: 40
  target_defect_rate: 0.05
timeseries:
  crimp_force_points: 128
  aux_points: 64
  aux_channels: [motor_current, vibration, temperature]
  sensor_dropout_rate: 0.01
images:
  per_unit_probability: 0.25
  size: 128
labels:
  label_delay_days: 5
  label_noise_rate: 0.01
mechanisms:
  # Tuned so each tool completes several full wear->maintenance cycles across
  # the whole date range (not just one, near the end) — see units.py comment
  # on tool.cycles reset; a single-cycle-per-run design makes wear-derived
  # features unbounded monotonic proxies for elapsed time, which collapses
  # temporal-split generalization for tree models.
  tool_wear: {enabled: true, wear_per_cycle: 0.036, strength: 2.2}
  supplier_lot: {enabled: true, bad_lot_fraction: 0.15, strength: 2.5}
  humidity: {enabled: true, threshold_pct: 70, strength: 1.8}
  calibration_offset: {enabled: true, affected_machine_fraction: 0.2, strength: 2.0}
  changeover: {enabled: true, first_pieces: 5, strength: 1.6}
  sensor_drift: {enabled: true, drift_per_day: 0.002}
  maintenance_effect: {enabled: true, relief: 0.8, halflife_days: 3}
  revision_shift: {enabled: true, shifted_revision_fraction: 0.3, strength: 1.2}
  night_shift_load: {enabled: true, strength: 1.3}
  camera_misalignment: {enabled: true, window_fraction: 0.1, blur_sigma: 2.0}
