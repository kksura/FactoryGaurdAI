# Large profile: cloud-scale testing. Generate on beefy compute; not for CI.
profile: large
seed: 42
date_range:
  start: "2025-06-01"
  end: "2026-05-31"
world:
  plants: 5
  lines_per_plant: 4
  crimp_machines_per_line: 4
  operators_per_plant: 60
  suppliers: 12
  product_families: 6
  products_per_family: 5
  material_lots_per_component: 32
production:
  units: 200000
  units_per_work_order: 80
  target_defect_rate: 0.03
timeseries:
  crimp_force_points: 200
  aux_points: 100
  aux_channels: [motor_current, vibration, temperature, pressure]
  sensor_dropout_rate: 0.01
images:
  per_unit_probability: 0.05
  size: 192
labels:
  label_delay_days: 7
  label_noise_rate: 0.015
mechanisms:
  # See small.yaml comment: tuned for multiple wear/maintenance cycles per
  # tool across the full date range instead of a single terminal cycle.
  tool_wear: {enabled: true, wear_per_cycle: 0.003, strength: 2.2}
  supplier_lot: {enabled: true, bad_lot_fraction: 0.08, strength: 2.5}
  humidity: {enabled: true, threshold_pct: 70, strength: 1.8}
  calibration_offset: {enabled: true, affected_machine_fraction: 0.12, strength: 2.0}
  changeover: {enabled: true, first_pieces: 5, strength: 1.6}
  sensor_drift: {enabled: true, drift_per_day: 0.002}
  maintenance_effect: {enabled: true, relief: 0.8, halflife_days: 3}
  revision_shift: {enabled: true, shifted_revision_fraction: 0.2, strength: 1.2}
  night_shift_load: {enabled: true, strength: 1.3}
  camera_misalignment: {enabled: true, window_fraction: 0.06, blur_sigma: 2.0}
