global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: factoryguard-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
  - job_name: factoryguard-api-host
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8010"]  # `make serve` on the host (8010: 8000 is often taken on the dev box)
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
